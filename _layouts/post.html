---
layout: default
---

<article>
  <header class="post-header">
    <h2 class="post-title">{{ page.title }}</h2>
    <p class="post-date">Published on {{ page.date | date: "%B %-d, %Y" }}</p>
  </header>

  {% if page.deck %}
  <p class="deck">{{ page.deck }}</p>
  {% endif %}

  {% if page.repo %}
  <p class="repo-link">Code: <a href="{{ page.repo }}">{{ page.repo }}</a></p>
  {% endif %}

  {{ content }}
</article>

<p style="margin-top: 40px;"><a href="{{ '/' | relative_url }}">&larr; Back to home</a></p>
