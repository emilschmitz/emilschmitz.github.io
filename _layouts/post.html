---
layout: default
---

<article>
  <header class="post-header">
    <h2 class="post-title">{{ page.title }}</h2>
    <p class="post-meta">
      <time datetime="{{ page.date | date: '%Y-%m-%d' }}">{{ page.date | date: "%B %-d, %Y" }}</time>{% if page.repo %}<span class="meta-sep">·</span><a href="{{ page.repo }}">code</a>{% endif %}
    </p>
    {% if page.deck %}
    <p class="deck">{{ page.deck }}</p>
    {% endif %}
  </header>

  {{ content }}
</article>

<p style="margin-top: 40px;"><a href="{{ '/' | relative_url }}">&larr; Back to home</a></p>
