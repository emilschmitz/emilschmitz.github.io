<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} - {% endif %}{{ site.title }}</title>
  <meta name="description" content="{% if page.summary %}{{ page.summary }}{% else %}{{ site.description }}{% endif %}">
  <style>
    body {
      font-family: Georgia, "Times New Roman", Times, serif;
      line-height: 1.65;
      max-width: 740px;
      margin: 40px auto;
      padding: 0 16px;
      color: #111;
      background: #fff;
    }
    h1, h2, h3 { line-height: 1.25; font-weight: 600; }
    h2 { margin-top: 2em; border-bottom: 1px solid #e2e2e2; padding-bottom: 0.25em; }
    h3 { margin-top: 1.4em; }
    a { color: #0000ee; }
    a:visited { color: #551a8b; }
    hr { border: 0; border-top: 1px solid #ccc; margin: 20px 0; }
    .post-date { color: #555; font-style: italic; font-size: 0.9em; }
    table {
      width: 100%;
      border-collapse: collapse;
      margin: 1.2em 0 1.6em;
      font-size: 0.88em;
      line-height: 1.35;
      display: block;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    thead th {
      text-align: left;
      border-bottom: 2px solid #222;
      padding: 0.5em 0.6em;
      white-space: nowrap;
      background: #f7f7f7;
    }
    tbody td {
      border-bottom: 1px solid #e0e0e0;
      padding: 0.45em 0.6em;
      vertical-align: top;
    }
    tbody tr:nth-child(even) td { background: #fafafa; }
    td:nth-child(n+2), th:nth-child(n+2) {
      text-align: right;
      font-variant-numeric: tabular-nums;
      font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
      font-size: 0.95em;
    }
    td:first-child, th:first-child {
      text-align: left;
      font-family: Georgia, "Times New Roman", Times, serif;
      white-space: nowrap;
    }
    img {
      max-width: 100%;
      height: auto;
      display: block;
      margin: 1.1em auto 0.4em;
      border: 1px solid #e8e8e8;
    }
    .figcap {
      text-align: center;
      font-size: 0.88em;
      color: #444;
      margin: 0 0 1.4em;
      font-style: italic;
    }
    code {
      font-size: 0.88em;
      background: #f3f3f3;
      padding: 0.08em 0.28em;
      border-radius: 3px;
    }
    ul, ol { padding-left: 1.35em; }
    li { margin: 0.3em 0; }
    blockquote {
      margin: 1em 0;
      padding: 0.2em 0 0.2em 1em;
      border-left: 3px solid #ccc;
      color: #333;
    }
    .mjx-chtml { font-size: 110% !important; }
  </style>
  <script>
    window.MathJax = {
      tex: {
        inlineMath: [['\\(', '\\)'], ['$', '$']],
        displayMath: [['\\[', '\\]'], ['$$', '$$']],
        processEscapes: true
      },
      options: { skipHtmlTags: ['script','noscript','style','textarea','pre','code'] }
    };
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
</head>
<body>
  <header>
    <h1 style="margin-bottom: 5px;"><a href="{{ '/' | relative_url }}" style="text-decoration: none; color: #111;">{{ site.title }}</a></h1>
    <div style="font-style: italic; margin-bottom: 10px;">{{ site.description }}</div>
    <nav>
      <a href="https://github.com/{{ site.github_username }}">GitHub</a> /
      <a href="https://www.linkedin.com/in/{{ site.linkedin_username }}">LinkedIn</a>
    </nav>
  </header>
  <hr>
  <main>
    {{ content }}
  </main>
</body>
</html>
