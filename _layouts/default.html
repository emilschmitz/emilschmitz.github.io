<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} - {% endif %}{{ site.title }}</title>
  <meta name="description" content="{% if page.summary %}{{ page.summary }}{% else %}{{ site.description }}{% endif %}">
  <style>
    body {
      font-family: Georgia, "Times New Roman", Times, serif;
      line-height: 1.65;
      max-width: 740px;
      margin: 40px auto;
      padding: 0 16px;
      color: #111;
      background: #fff;
    }
    h1, h2, h3 { line-height: 1.25; font-weight: 600; }
    h2 { margin-top: 2em; border-bottom: 1px solid #e2e2e2; padding-bottom: 0.25em; }
    h3 { margin-top: 1.4em; }
    a { color: #0000ee; }
    a:visited { color: #551a8b; }
    hr { border: 0; border-top: 1px solid #ccc; margin: 20px 0; }
    .post-header {
      display: block;
      margin: 0 0 1.75em;
      padding: 0;
      border: 0;
    }
    .post-header .post-title {
      display: block;
      margin: 0 0 0.35em;
      border: 0;
      padding: 0;
      font-size: 2.45em;
      line-height: 1.12;
      font-weight: 700;
    }
    .post-meta {
      margin: 0 0 0.85em;
      color: #777;
      font-size: 0.88em;
      font-style: italic;
      line-height: 1.4;
    }
    .post-meta a {
      color: #666;
      text-decoration: underline;
      text-underline-offset: 2px;
    }
    .post-meta a:visited {
      color: #666;
    }
    .post-meta .meta-sep {
      margin: 0 0.35em;
      font-style: normal;
      color: #bbb;
    }
    .deck {
      margin: 0;
      font-size: 1.05em;
      letter-spacing: 0;
      text-transform: none;
      color: #444;
      font-family: Georgia, "Times New Roman", Times, serif;
      font-style: italic;
      font-weight: 400;
      line-height: 1.45;
    }
    .table-note {
      margin: -0.25em 0 1.6em;
      font-size: 0.84em;
      color: #555;
      text-align: center;
      font-style: italic;
    }
    .results-wrap {
      margin: 0.35em auto 0.55em;
      max-width: 100%;
    }
    table.results-table {
      width: 100%;
      table-layout: fixed;
      border-collapse: collapse;
      margin: 0 auto;
      font-size: 0.78em;
      line-height: 1.25;
      display: table;
      overflow: visible;
    }
    table.results-table col.col-agent { width: 22%; }
    table.results-table col.col-task { width: 19.5%; }
    table.results-table thead th {
      text-align: center;
      border-bottom: 1px solid #bbb;
      padding: 0.45em 0.35em;
      white-space: normal;
      background: #f4f4f4;
      font-weight: 600;
      font-size: 0.92em;
      vertical-align: bottom;
      hyphens: auto;
    }
    table.results-table thead th:first-child {
      text-align: left;
    }
    table.results-table tbody th {
      text-align: left;
      font-weight: 600;
      padding: 0.55em 0.4em;
      border-bottom: 1px solid #e4e4e4;
      vertical-align: middle;
      background: #fff;
    }
    table.results-table tbody td {
      border-bottom: 1px solid #e4e4e4;
      padding: 0.45em 0.3em;
      vertical-align: middle;
      text-align: center;
    }
    .agent-name {
      display: block;
      font-family: Georgia, "Times New Roman", Times, serif;
      font-size: 1.02em;
      line-height: 1.2;
    }
    .agent-model {
      display: block;
      margin-top: 0.15em;
      font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
      font-size: 0.82em;
      font-weight: 400;
      color: #555;
      line-height: 1.2;
    }
    td.rate {
      font-variant-numeric: tabular-nums;
      font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
      font-size: 0.95em;
      font-weight: 600;
      color: #111;
    }
    td.rate.rate-na {
      background: #ececec;
      color: #666;
      font-weight: 500;
    }
    td.rate .disc {
      display: block;
      margin-top: 0.12em;
      font-size: 0.78em;
      font-weight: 400;
      opacity: 0.85;
    }
    /* fallback tables on other posts */
    table:not(.results-table) {
      width: 100%;
      border-collapse: collapse;
      margin: 1.2em 0 1.6em;
      font-size: 0.88em;
      line-height: 1.35;
    }
    table:not(.results-table) thead th {
      text-align: left;
      border-bottom: 2px solid #222;
      padding: 0.5em 0.6em;
      background: #f7f7f7;
    }
    table:not(.results-table) tbody td {
      border-bottom: 1px solid #e0e0e0;
      padding: 0.45em 0.6em;
      vertical-align: top;
    }
    img {
      max-width: 100%;
      height: auto;
      display: block;
      margin: 1.1em auto 0.4em;
      border: 1px solid #e8e8e8;
    }
    .figcap {
      text-align: center;
      font-size: 0.88em;
      color: #444;
      margin: 0 0 1.4em;
      font-style: italic;
    }
    code {
      font-size: 0.88em;
      background: #f3f3f3;
      padding: 0.08em 0.28em;
      border-radius: 3px;
    }
    ul, ol { padding-left: 1.35em; }
    li { margin: 0.3em 0; }
    blockquote {
      margin: 1em 0;
      padding: 0.2em 0 0.2em 1em;
      border-left: 3px solid #ccc;
      color: #333;
    }
    /* Incident source callouts (OopsBench, etc.) */
    aside.grounding {
      margin: 1em 0 1.35em;
      padding: 0.7em 0.95em 0.8em;
      border: 1px solid #d8d8d8;
      border-left: 3px solid #666;
      background: #f7f7f5;
      border-radius: 2px;
      font-size: 0.86em;
      line-height: 1.5;
      color: #333;
    }
    aside.grounding p {
      margin: 0.45em 0 0;
    }
    aside.grounding p:first-child {
      margin-top: 0;
    }
    aside.grounding a {
      word-break: break-all;
    }
    .mjx-chtml { font-size: 110% !important; }
  </style>
  <script>
    window.MathJax = {
      tex: {
        inlineMath: [['\\(', '\\)'], ['$', '$']],
        displayMath: [['\\[', '\\]'], ['$$', '$$']],
        processEscapes: true
      },
      options: { skipHtmlTags: ['script','noscript','style','textarea','pre','code'] }
    };
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
</head>
<body>
  <header>
    <h1 style="margin-bottom: 5px;"><a href="{{ '/' | relative_url }}" style="text-decoration: none; color: #111;">{{ site.title }}</a></h1>
    <div style="font-style: italic; margin-bottom: 10px;">{{ site.description }}</div>
    <nav>
      <a href="https://github.com/{{ site.github_username }}">GitHub</a> /
      <a href="https://www.linkedin.com/in/{{ site.linkedin_username }}">LinkedIn</a>
    </nav>
  </header>
  <hr>
  <main>
    {{ content }}
  </main>
</body>
</html>
