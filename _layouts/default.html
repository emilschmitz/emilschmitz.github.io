<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} - {% endif %}{{ site.title }}</title>
  <meta name="description" content="{% if page.summary %}{{ page.summary }}{% else %}{{ site.description }}{% endif %}">
  <style>
    body {
      font-family: Georgia, "Times New Roman", Times, serif;
      line-height: 1.6;
      max-width: 650px;
      margin: 40px auto;
      padding: 0 10px;
      color: #111;
      background-color: #fff;
    }
    h1, h2, h3 {
      line-height: 1.2;
    }
    a {
      color: #0000ee;
    }
    a:visited {
      color: #551a8b;
    }
    hr {
      border: 0;
      border-top: 1px solid #ccc;
      margin: 20px 0;
    }
    .post-date {
      color: #555;
      font-style: italic;
      font-size: 0.9em;
    }
  </style>
</head>
<body>
  <header>
    <h1 style="margin-bottom: 5px;"><a href="{{ '/' | relative_url }}" style="text-decoration: none; color: #111;">{{ site.title }}</a></h1>
    <div style="font-style: italic; margin-bottom: 10px;">{{ site.description }}</div>
    <nav>
      <a href="https://github.com/{{ site.github_username }}">GitHub</a> / 
      <a href="https://www.linkedin.com/in/{{ site.linkedin_username }}">LinkedIn</a>
    </nav>
  </header>
  <hr>
  <main>
    {{ content }}
  </main>
</body>
</html>
