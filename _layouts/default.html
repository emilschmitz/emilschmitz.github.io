<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} - {% endif %}{{ site.title }}</title>
  <meta name="description" content="{% if page.summary %}{{ page.summary }}{% else %}{{ site.description }}{% endif %}">
  <style>
    body {
      font-family: Georgia, "Times New Roman", Times, serif;
      line-height: 1.65;
      max-width: 720px;
      margin: 40px auto;
      padding: 0 16px;
      color: #111;
      background-color: #fff;
    }
    h1, h2, h3 {
      line-height: 1.25;
      font-weight: 600;
    }
    h2 { margin-top: 2em; }
    h3 { margin-top: 1.5em; }
    a { color: #0000ee; }
    a:visited { color: #551a8b; }
    hr {
      border: 0;
      border-top: 1px solid #ccc;
      margin: 20px 0;
    }
    .post-date {
      color: #555;
      font-style: italic;
      font-size: 0.9em;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin: 1.25em 0;
      font-size: 0.92em;
      line-height: 1.4;
    }
    thead th {
      text-align: left;
      border-bottom: 2px solid #222;
      padding: 0.45em 0.55em;
      font-weight: 600;
      white-space: nowrap;
    }
    tbody td {
      border-bottom: 1px solid #ddd;
      padding: 0.4em 0.55em;
      vertical-align: top;
    }
    tbody tr:last-child td { border-bottom: 1px solid #bbb; }
    td:nth-child(n+2), th:nth-child(n+2) {
      text-align: right;
      font-variant-numeric: tabular-nums;
      font-family: "Iosevka", "SF Mono", Menlo, Consolas, monospace;
      font-size: 0.95em;
    }
    /* first col stays prose */
    td:first-child, th:first-child {
      text-align: left;
      font-family: Georgia, "Times New Roman", Times, serif;
      font-variant-numeric: normal;
    }
    img {
      max-width: 100%;
      height: auto;
      display: block;
      margin: 1.25em auto;
    }
    code {
      font-size: 0.9em;
      background: #f4f4f4;
      padding: 0.1em 0.3em;
      border-radius: 3px;
    }
    ul, ol { padding-left: 1.4em; }
    li { margin: 0.25em 0; }
    .math-block { overflow-x: auto; }
  </style>
  <script>
    window.MathJax = {
      tex: {
        inlineMath: [['\\(', '\\)']],
        displayMath: [['\\[', '\\]']],
        processEscapes: true
      }
    };
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
</head>
<body>
  <header>
    <h1 style="margin-bottom: 5px;"><a href="{{ '/' | relative_url }}" style="text-decoration: none; color: #111;">{{ site.title }}</a></h1>
    <div style="font-style: italic; margin-bottom: 10px;">{{ site.description }}</div>
    <nav>
      <a href="https://github.com/{{ site.github_username }}">GitHub</a> /
      <a href="https://www.linkedin.com/in/{{ site.linkedin_username }}">LinkedIn</a>
    </nav>
  </header>
  <hr>
  <main>
    {{ content }}
  </main>
</body>
</html>
